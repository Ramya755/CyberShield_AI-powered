name: cyber_shield
description: "A unified CyberShield Flutter project (team merged modules: reporting, scanner, detector, notifications, auth)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.7.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5+1

  # Networking
  http: ^1.1.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Device Preview
  device_preview: ^1.1.0

  # Formatting / Localization
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Local ML
  tflite_flutter: ^0.11.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Local Database
  realm: ^20.1.1

  # MongoDB / Backup Sync
  mongo_dart: ^0.10.4

  # Internet Check
  connectivity_plus: ^6.1.4

  # Storage Paths
  path_provider: ^2.1.5
  path: ^1.9.1

  # Preferences
  shared_preferences: ^2.5.3

  # External URLs
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/sms_model.tflite
    - assets/tokenizers/tokenizer.json
